<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Aura Engine</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .hero { text-align: center; padding: 2rem; }
        .course-card { background: #1e293b; border-radius: 1rem; padding: 1rem; margin: 1rem; display: inline-block; width: 300px; vertical-align: top; }
        .btn { background: #4f46e5; padding: 0.5rem 1rem; border-radius: 2rem; color: white; text-decoration: none; display: inline-block; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AURA ENGINE PRO</h1>
        <p>Автономная платформа обучения с локальным AI</p>
        <a href="admin.html" class="btn">🔐 Админ-панель</a>
    </div>
    <h2>📖 Курсы</h2>
    <div id="coursesList"></div>
    <script>
        async function loadCourses() {
            const snapshot = await db.collection('courses').orderBy('createdAt', 'desc').get();
            const container = document.getElementById('coursesList');
            if (snapshot.empty) { container.innerHTML = '<p>Пока нет курсов</p>'; return; }
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const c = doc.data();
                container.innerHTML += `
                    <div class="course-card">
                        <h3>${escapeHtml(c.title)}</h3>
                        <p>${escapeHtml(c.author)}</p>
                        <p>${escapeHtml(c.description || '')}</p>
                        <small>${new Date(c.createdAt?.toDate()).toLocaleDateString()}</small>
                    </div>
                `;
            });
        }
        function escapeHtml(str) { return str?.replace(/[&<>]/g, m => m=='&'?'&amp;':(m=='<'?'&lt;':'&gt;')) || ''; }
        loadCourses();
    </script>
</body>
</html>
