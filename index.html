<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aura Engine — оффлайн обучение</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: system-ui; background: #0f172a; color: #f1f5f9; margin: 0; padding: 2rem; }
        .hero { text-align: center; padding: 3rem 1rem; }
        h1 { font-size: 3rem; }
        .gradient { background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .course { background: #1e293b; border-radius: 1rem; padding: 1.5rem; margin: 1rem 0; }
        a { color: #a5b4fc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { background: #4f46e5; padding: 0.5rem 1.5rem; border-radius: 2rem; display: inline-block; margin-top: 1rem; }
        .flex { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AURA <span class="gradient">ENGINE</span> PRO</h1>
        <p>Автономная платформа обучения с локальным AI<br>Работает полностью без интернета после установки</p>
        <div class="flex" style="justify-content: center; margin-top: 1.5rem;">
            <a href="#" class="btn" style="background: #4f46e5;">📥 Скачать для Windows</a>
            <a href="admin.html" class="btn" style="background: #334155;">🔐 Админ-панель</a>
        </div>
    </div>

    <h2>📖 Доступные курсы</h2>
    <div id="coursesList"></div>

    <script>
        async function loadCourses() {
            const snapshot = await db.collection('courses').orderBy('createdAt', 'desc').get();
            const container = document.getElementById('coursesList');
            if (snapshot.empty) {
                container.innerHTML = '<p>Пока нет курсов. Зайдите в админ-панель, чтобы добавить.</p>';
                return;
            }
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const c = doc.data();
                container.innerHTML += `
                    <div class="course">
                        <h3>${escapeHtml(c.title)}</h3>
                        <p>👤 ${escapeHtml(c.author)}</p>
                        <p>📌 ${escapeHtml(c.description || 'Без описания')}</p>
                        <a href="${c.archiveUrl}" target="_blank">⬇️ Скачать курс (.aura)</a>
                        <br><small>${new Date(c.createdAt?.toDate()).toLocaleDateString()}</small>
                    </div>
                `;
            });
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }
        loadCourses();
    </script>
</body>
</html>
