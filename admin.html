<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Aura Admin – создание курсов</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui; padding: 2rem; max-width: 1000px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; }
        input, textarea { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border-radius: 0.5rem; background: #0f172a; color: white; border: 1px solid #334155; }
        button { background: #4f46e5; padding: 0.5rem 1rem; border-radius: 2rem; border: none; color: white; cursor: pointer; margin: 0.25rem; }
        .lesson-block { background: #0f172a; padding: 1rem; margin-bottom: 1rem; border-radius: 1rem; }
        .course { background: #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>Aura Studio Admin</h1>
    <div class="card">
        <h2>➕ Создать новый курс</h2>
        <input type="text" id="courseTitle" placeholder="Название курса">
        <input type="text" id="courseAuthor" placeholder="Автор">
        <textarea id="courseDesc" placeholder="Описание курса" rows="2"></textarea>
        
        <h3>Уроки</h3>
        <div id="lessonsContainer"></div>
        <button onclick="addLesson()">+ Добавить урок</button>
        <button onclick="saveCourse()">💾 Сохранить курс</button>
        <div id="log" style="margin-top:1rem; color:#a5b4fc;"></div>
    </div>

    <h2>📚 Существующие курсы</h2>
    <div id="coursesList"></div>

    <script>
        let lessons = [];

        function addLesson() {
            const id = Date.now() + Math.random();
            lessons.push({ id, title: 'Новый урок', html: '<p>Содержание урока</p>', quiz: [] });
            renderLessons();
        }

        function updateLessonTitle(id, title) {
            const lesson = lessons.find(l => l.id == id);
            if (lesson) lesson.title = title;
        }

        function updateLessonHtml(id, html) {
            const lesson = lessons.find(l => l.id == id);
            if (lesson) lesson.html = html;
        }

        function removeLesson(id) {
            lessons = lessons.filter(l => l.id != id);
            renderLessons();
        }

        function renderLessons() {
            const container = document.getElementById('lessonsContainer');
            container.innerHTML = '';
            lessons.forEach((lesson, idx) => {
                const lessonDiv = document.createElement('div');
                lessonDiv.className = 'lesson-block';
                lessonDiv.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <input type="text" value="${escapeHtml(lesson.title)}" onchange="updateLessonTitle(${lesson.id}, this.value)" style="flex:1; margin-right:1rem;">
                        <button onclick="removeLesson(${lesson.id})">🗑️</button>
                    </div>
                    <textarea rows="5" onchange="updateLessonHtml(${lesson.id}, this.value)">${escapeHtml(lesson.html)}</textarea>
                `;
                container.appendChild(lessonDiv);
            });
        }

        async function saveCourse() {
            const title = document.getElementById('courseTitle').value.trim();
            const author = document.getElementById('courseAuthor').value.trim();
            const description = document.getElementById('courseDesc').value.trim();
            if (!title || !author) {
                alert("Заполните название и автора");
                return;
            }
            if (lessons.length === 0) {
                alert("Добавьте хотя бы один урок");
                return;
            }
            const log = document.getElementById('log');
            log.innerText = "Сохранение...";
            const btn = event.target;
            btn.disabled = true;
            try {
                const courseData = {
                    title, author, description,
                    lessons: lessons.map(l => ({ id: l.id, title: l.title, content: l.html, quiz: [] })),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                await db.collection('courses').add(courseData);
                log.innerText = "✅ Курс сохранён! Страница обновится.";
                setTimeout(() => location.reload(), 1500);
            } catch (err) {
                log.innerText = "❌ Ошибка: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }

        async function loadCourses() {
            const snapshot = await db.collection('courses').orderBy('createdAt', 'desc').get();
            const container = document.getElementById('coursesList');
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const c = doc.data();
                container.innerHTML += `
                    <div class="course">
                        <h3>${escapeHtml(c.title)}</h3>
                        <p>${escapeHtml(c.author)}</p>
                        <p>${escapeHtml(c.description || '')}</p>
                        <small>${new Date(c.createdAt?.toDate()).toLocaleString()}</small>
                        <div><button onclick="deleteCourse('${doc.id}')">🗑️ Удалить</button></div>
                    </div>
                `;
            });
        }

        async function deleteCourse(docId) {
            if (!confirm("Удалить курс?")) return;
            await db.collection('courses').doc(docId).delete();
            loadCourses();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }

        loadCourses();
    </script>
</body>
</html>
