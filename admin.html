<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aura Admin – управление курсами</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: system-ui; background: #0f172a; color: white; padding: 2rem; max-width: 600px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border-radius: 8px; border: none; }
        button { background: #4f46e5; color: white; padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; margin-top: 10px; }
        pre { background: #1e293b; padding: 10px; border-radius: 8px; }
        .course { background: #1e293b; margin: 15px 0; padding: 15px; border-radius: 12px; }
    </style>
</head>
<body>
    <h2>➕ Добавить курс</h2>
    <input type="text" id="title" placeholder="Название курса">
    <input type="text" id="author" placeholder="Автор">
    <textarea id="desc" placeholder="Краткое описание" rows="2"></textarea>
    <input type="text" id="archiveUrl" placeholder="Прямая ссылка на ZIP/.aura архив">
    <button onclick="addCourse()">Опубликовать</button>
    <pre id="log"></pre>

    <h2>📚 Список курсов</h2>
    <div id="coursesList"></div>

    <script>
        async function loadCourses() {
            const snapshot = await db.collection('courses').orderBy('createdAt', 'desc').get();
            const container = document.getElementById('coursesList');
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const c = doc.data();
                container.innerHTML += `
                    <div class="course">
                        <strong>${escapeHtml(c.title)}</strong> — ${escapeHtml(c.author)}<br>
                        ${c.description ? escapeHtml(c.description) + '<br>' : ''}
                        <a href="${c.archiveUrl}" target="_blank" style="color:#a5b4fc">⬇️ Скачать курс</a><br>
                        <button onclick="deleteCourse('${doc.id}')" style="background:#ef4444; margin-top:8px;">🗑️ Удалить</button>
                    </div>
                `;
            });
        }

        async function addCourse() {
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const description = document.getElementById('desc').value.trim();
            const archiveUrl = document.getElementById('archiveUrl').value.trim();
            if (!title || !author || !archiveUrl) {
                alert("Заполните название, автора и ссылку на архив");
                return;
            }
            const log = document.getElementById('log');
            log.innerText = "Добавление...";
            try {
                await db.collection('courses').add({
                    title, author, description, archiveUrl,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                log.innerText = "✅ Курс добавлен! Страница обновится через 2 секунды.";
                setTimeout(() => location.reload(), 2000);
            } catch(e) {
                log.innerText = "❌ Ошибка: " + e.message;
            }
        }

        async function deleteCourse(id) {
            if (!confirm("Удалить курс?")) return;
            await db.collection('courses').doc(id).delete();
            loadCourses();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }

        loadCourses();
    </script>
</body>
</html>
