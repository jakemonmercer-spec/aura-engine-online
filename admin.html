<script>
const GITHUB_TOKEN = 'PASTE_NEW_VALID_TOKEN_HERE';
const REPO_OWNER = 'jakemonmercer-spec';
const REPO_NAME = 'aura-engine-online';
const BRANCH = 'main';

/* ---------------- LOAD ---------------- */

async function loadCourses() {
    const snapshot = await db.collection('courses').orderBy('createdAt', 'desc').get();
    const container = document.getElementById('coursesList');
    container.innerHTML = '';

    snapshot.forEach(doc => {
        const c = doc.data();

        container.innerHTML += `
            <div class="course">
                <div style="display:flex; gap:1rem;">
                    ${c.imageUrl ? `<img src="${c.imageUrl}">` : ''}
                    <div style="flex:1">
                        <h3>${escapeHtml(c.title)}</h3>
                        <p>${escapeHtml(c.author)}</p>
                        <p>${escapeHtml(c.description || '')}</p>
                        <a href="${c.archiveUrl}" target="_blank">📥 Скачать</a>
                        <br>
                        <button onclick="deleteCourse('${doc.id}', '${c.imagePath || ''}', '${c.archivePath || ''}')">
                            🗑️ Удалить
                        </button>
                    </div>
                </div>
            </div>
        `;
    });
}

/* ---------------- UPLOAD ---------------- */

async function uploadToGitHub(file, folder) {
    const filename = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
    const filePath = `${folder}/${filename}`;

    const contentBase64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
    });

    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`;

    const response = await fetch(url, {
        method: 'PUT',
        headers: {
            Authorization: `token ${GITHUB_TOKEN}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            message: `upload ${filename}`,
            content: contentBase64,
            branch: BRANCH
        })
    });

    const data = await response.json();

    if (!response.ok) {
        throw new Error(data.message || 'GitHub upload error');
    }

    return {
        rawUrl: `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${filePath}`,
        path: filePath
    };
}

/* ---------------- ADD COURSE ---------------- */

async function addCourse(event) {
    const btn = event.target;

    const title = document.getElementById('title').value.trim();
    const author = document.getElementById('author').value.trim();
    const description = document.getElementById('desc').value.trim();
    const imageFile = document.getElementById('imageFile').files[0];
    const archiveFile = document.getElementById('archiveFile').files[0];

    if (!title || !author || !archiveFile) {
        alert("Заполни поля");
        return;
    }

    btn.disabled = true;

    try {
        let imageUrl = '', imagePath = '';

        if (imageFile) {
            const img = await uploadToGitHub(imageFile, 'covers');
            imageUrl = img.rawUrl;
            imagePath = img.path;
        }

        const archive = await uploadToGitHub(archiveFile, 'courses');

        await db.collection('courses').add({
            title,
            author,
            description,
            imageUrl,
            imagePath,
            archiveUrl: archive.rawUrl,
            archivePath: archive.path,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        location.reload();

    } catch (e) {
        alert("Ошибка: " + e.message);
    } finally {
        btn.disabled = false;
    }
}

/* ---------------- DELETE (FIXED) ---------------- */

async function getFileSha(path) {
    const res = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
        {
            headers: { Authorization: `token ${GITHUB_TOKEN}` }
        }
    );

    const data = await res.json();
    return data.sha;
}

async function deleteFromGitHub(path) {
    const sha = await getFileSha(path);

    const res = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
        {
            method: 'DELETE',
            headers: {
                Authorization: `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: 'delete file',
                sha,
                branch: BRANCH
            })
        }
    );

    return res.json();
}

async function deleteCourse(id, imagePath, archivePath) {
    if (!confirm("Удалить курс?")) return;

    try {
        if (archivePath) await deleteFromGitHub(archivePath);
        if (imagePath) await deleteFromGitHub(imagePath);

        await db.collection('courses').doc(id).delete();

        loadCourses();

    } catch (e) {
        alert("Ошибка удаления: " + e.message);
    }
}

/* ---------------- UTILS ---------------- */

function escapeHtml(str) {
    return str?.replace(/[&<>]/g, m =>
        m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'
    ) || '';
}

/* ---------------- INIT ---------------- */

loadCourses();
</script>
