<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Player — Интерактивное обучение</title>
    
    <!-- ПОДКЛЮЧЕНИЕ СТИЛЕЙ -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="aura-content.css">
    
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- ТЕХНОЛОГИЧЕСКИЙ СТЕК -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- FIREBASE SDK (COMPAT) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        /**
         * КОНФИГУРАЦИЯ ОБЛАЧНОГО ДОСТУПА
         */
        const firebaseConfig = {
            apiKey: "AIzaSyAnwcfKCVB35c4ReExi3KKIfH2b3HpEJSE",
            authDomain: "auraengineonline.firebaseapp.com",
            projectId: "auraengineonline",
            storageBucket: "auraengineonline.firebasestorage.app",
            messagingSenderId: "433967688454",
            appId: "1:433967688454:web:61011b44105de083d68c87",
            measurementId: "G-4C30YKM8ZF"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        window.auraCloudDB = firebase.firestore();
        window.firebase = firebase;

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        aura: {
                            primary: '#4f46e5',
                            indigo: '#6366f1',
                            accent: '#f43f5e',
                            dark: '#020617'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            transition: background-color 0.5s ease;
        }
        .space-font { font-family: 'Orbitron', sans-serif; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .dark .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* КОНТЕНТ-ЗОНА */
        #content-container {
            scroll-behavior: smooth;
            background: #ffffff;
            height: calc(100vh - 10rem); /* Вычитаем хедер и футер */
        }
        .dark #content-container {
            background: #020617;
        }

        /* ИИ-ЧАТ */
        #ai-chat {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
            z-index: 150;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-aura-dark dark:text-slate-100">

    <!-- =========================================================
         HEADER: NAVIGATION & MASTER CONTROL
         ========================================================= -->
  <header class="h-20 glass-nav flex justify-between items-center px-4 md:px-10 shadow-sm sticky top-0">
    <!-- Группа навигации -->
    <div class="flex items-center gap-2 flex-shrink-0">
        <button onclick="location.href='market.html'" class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-white/5 text-slate-500 hover:text-aura-primary">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <!-- Твоя иконка списка, ставшая функциональной -->
        <button onclick="toggleSidebar()" class="w-9 h-9 flex items-center justify-center rounded-xl text-aura-primary hover:bg-aura-primary hover:text-white transition-all">
            <i class="fa-solid fa-list-ul text-lg"></i>
        </button>
    </div>

    <!-- Заголовок (скрывается на 320px если не влезает) -->
    <div class="text-center flex-1 px-2 overflow-hidden">
        <h2 id="player-course-title" class="space-font font-black dark:text-white uppercase tracking-tighter text-xs md:text-lg truncate">Загрузка...</h2>
         <p id="player-lesson-title" class="text-[9px] font-black uppercase text-aura-primary tracking-[0.2em] mt-1 opacity-70">Выбор модуля</p>
    </div>

    <!-- Группа профиля -->
    <div class="flex items-center gap-2 flex-shrink-0">
        <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 border border-slate-200 dark:border-white/10">
            <i id="theme-icon-app" class="fa-solid fa-moon"></i>
        </button>
        <div id="auth-btn-container" class="hidden sm:block"></div>
    </div>
</header>

    <!-- =========================================================
         MAIN WORKSPACE: SIDEBAR (DRAWER) & CONTENT
         ========================================================= -->
    <div class="player-grid">
        
        <!-- SIDEBAR: LESSONS LIST (DRAWER) -->
   <aside id="player-sidebar" class="custom-scrollbar">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] italic">Программа</h3>
            <div class="h-1 w-8 bg-aura-primary mt-1 rounded-full"></div>
        </div>
                <!-- КНОПКА ЗАКРЫТИЯ ВНУТРИ МЕНЮ -->
         <button onclick="toggleSidebar()" class="  w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-white/10 text-slate-400 transition-all">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </div>
            
            <div id="lessons-list" class="space-y-3">
                <!-- Контент генерируется через app.js -->
            </div>

            <!-- Дополнительная инфо-панель в меню -->
            <div class="mt-12 p-6 rounded-[2rem] bg-indigo-500/5 border border-indigo-500/10 text-center">
                <i class="fa-solid fa-graduation-cap text-2xl text-aura-primary mb-2"></i>
                <p class="text-[10px] font-bold uppercase text-slate-500">Учись в своем темпе с Aura PRO</p>
            </div>
        </aside>

        <!-- CONTENT AREA -->
      <!-- CONTENT AREA (ЗАМЕНИ ЭТОТ БЛОК) -->
        <main id="content-container" class="relative overflow-y-auto custom-scrollbar">
            <!-- Тот самый лоадер (overlay) -->
            <div id="loading-overlay" class="absolute inset-0 flex items-center justify-center bg-white dark:bg-aura-dark z-50 transition-opacity duration-500">
                <div class="text-center">
                    <i class="fa-solid fa-atom fa-spin text-5xl text-aura-primary mb-4"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-40">Загрузка модулей...</p>
                </div>
            </div>
            
            <!-- Сюда AuraRenderer отрисует блоки -->
            <div id="player-view" class="w-full"></div>
        </main>

    </div>

    <!-- =========================================================
         FOOTER: PROGRESS & ACTIONS
         ========================================================= -->
    <footer class="h-20 glass-nav border-t border-slate-200 dark:border-white/5 px-6 md:px-10 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <div id="lesson-status-tag" class="hidden px-6 py-2 rounded-full bg-emerald-500/10 text-emerald-500 text-[10px] font-black uppercase tracking-widest border border-emerald-500/20 shadow-sm animate-fade">
                <i class="fa-solid fa-check-double mr-2"></i> Пройдено
            </div>
            <div class="hidden md:flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-white/5 rounded-xl border dark:border-white/5">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-black uppercase text-slate-400">Cloud Sync Active</span>
            </div>
        </div>

        <!-- Кнопка должна быть ровно такой, чтобы скрипт её нашел -->
<button id="complete-btn" onclick="handleCompleteAction()" class="bg-aura-primary text-white px-10 md:px-16 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest italic shadow-2xl hover:bg-indigo-700 hover:scale-105 active:scale-95 transition-all flex items-center gap-4">
    <span>Завершить урок</span>
    <i class="fa-solid fa-circle-arrow-right text-lg"></i>
</button>
    </footer>

    <!-- =========================================================
         MODALS & OVERLAYS
         ========================================================= -->
    
    <!-- QUIZ MODAL -->
    <div id="quiz-modal" class="hidden fixed inset-0 z-[500] bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[3.5rem] max-w-2xl w-full shadow-2xl border dark:border-white/5 animate-slideUp overflow-hidden">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-indigo-500/10 text-aura-primary rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner">
                    <i class="fa-solid fa-vial"></i>
                </div>
                <h3 class="text-3xl font-black tracking-tighter italic uppercase dark:text-white">Контроль знаний</h3>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-2">Требуется 100% правильных ответов</p>
            </div>
            
            <div id="quiz-questions-container" class="max-h-[50vh] overflow-y-auto pr-4 custom-scrollbar space-y-6"></div>
            
            <div class="grid grid-cols-2 gap-4 mt-10">
                <button onclick="document.getElementById('quiz-modal').classList.add('hidden')" class="py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">Закрыть</button>
                <button onclick="validateQuiz()" class="bg-aura-primary py-4 rounded-2xl text-white font-black text-[10px] uppercase shadow-xl hover:bg-indigo-700 transition-all">Проверить ответы</button>
            </div>
        </div>
    </div>

    <!-- AI TUTOR BUTTON & WINDOW -->
    <div class="fixed bottom-28 right-8 z-[200]">
        <button onclick="toggleChat()" class="ai-pulse w-14 h-14 bg-aura-primary text-white rounded-2xl shadow-2xl flex items-center justify-center hover:scale-110 transition-all group">
            <i class="fa-solid fa-robot text-xl group-hover:rotate-12 transition-transform"></i>
        </button>

        <div id="ai-chat" class="hidden fixed bottom-24 right-4 left-4 md:left-auto md:w-[400px] max-h-[60vh] bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-white/5 flex flex-col overflow-hidden animate-slideUp">
            <div class="p-6 bg-slate-900 dark:bg-slate-800 text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-bolt-lightning text-yellow-400"></i>
                    <span class="font-black text-[10px] uppercase tracking-widest italic">Aura Assistant</span>
                </div>
                <button onclick="toggleChat()" class="opacity-50 hover:opacity-100"><i class="fa-solid fa-chevron-down"></i></button>
            </div>
            
            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 font-medium text-sm custom-scrollbar bg-slate-50/50 dark:bg-slate-950/20">
                <div class="bg-aura-primary text-white p-4 rounded-2xl rounded-tl-none text-xs leading-relaxed">
                    Привет! Я твой персональный AI-тьютор. Задай любой вопрос по теме урока, и я помогу разобраться.
                </div>
            </div>

            <div class="p-4 bg-white dark:bg-slate-900 border-t dark:border-white/5">
                <div class="relative">
                    <input type="text" id="chat-input" placeholder="Задать вопрос..." class="w-full p-4 pr-12 rounded-xl bg-slate-100 dark:bg-slate-800 border-none outline-none dark:text-white font-bold text-xs">
                    <button onclick="sendChatMessage()" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-aura-primary text-white rounded-lg flex items-center justify-center hover:bg-indigo-700 transition-all">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- МАСТЕР-ЯДРО -->
    <script src="app.js"></script>

    <script>
        /**
         * КРИТИЧЕСКАЯ ЛОГИКА ЗАГРУЗКИ КУРСА
         */
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');

            if (!courseId) {
                alert("Ошибка: ID курса не указан");
                location.href = 'market.html';
                return;
            }

            // Ждем инициализации облака в app.js
            setTimeout(async () => {
                if (window.auraCloudDB) {
                    try {
                        const doc = await window.auraCloudDB.collection('courses').doc(courseId).get();
                        if (doc.exists) {
                            const data = doc.data();
                            data.id = doc.id;
                            window.openCourse(encodeURIComponent(JSON.stringify(data)));
                        } else {
                            alert("Курс не найден в облачной базе");
                            location.href = 'market.html';
                        }
                    } catch (e) {
                        console.error("Firebase Error:", e);
                    }
                }
            }, 800);
        });
    </script>
</body>
</html>
