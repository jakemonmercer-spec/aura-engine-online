<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Player — Просмотр курса</title>
    
    <!-- ПОДКЛЮЧЕНИЕ СТИЛЕЙ -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="index.css">
    
    <!-- ТЕХНОЛОГИЧЕСКИЙ СТЕК -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- FIREBASE SDK (COMPAT) — Критично для синхронизации XP и данных курса -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnwcfKCVB35c4ReExi3KKIfH2b3HpEJSE",
            authDomain: "auraengineonline.firebaseapp.com",
            projectId: "auraengineonline",
            storageBucket: "auraengineonline.firebasestorage.app",
            messagingSenderId: "433967688454",
            appId: "1:433967688454:web:61011b44105de083d68c87",
            measurementId: "G-4C30YKM8ZF"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        window.auraCloudDB = firebase.firestore();
        window.firebase = firebase;

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        aura: {
                            primary: '#4f46e5',
                            indigo: '#6366f1',
                            dark: '#020617'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .space-font { font-family: 'Orbitron', sans-serif; }
        
        /* Архитектура плеера */
        .player-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: calc(100vh - 5rem);
        }

        .glass-ui {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .dark .glass-ui {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Зона контента */
        #content-container {
            scroll-behavior: smooth;
        }

        /* Чат */
        #ai-chat {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-aura-dark dark:text-slate-100 transition-colors duration-500">

    <!-- =========================================================
         TOP NAVIGATION BAR
         ========================================================= -->
    <header class="h-20 glass-ui sticky top-0 z-[100] flex justify-between items-center px-8 shadow-sm">
        <button onclick="location.href='market.html'" class="flex items-center gap-3 text-slate-400 font-black text-[10px] uppercase tracking-widest hover:text-aura-primary transition-all">
            <i class="fa-solid fa-arrow-left"></i> Назад в магазин
        </button>

        <div class="text-center">
            <h2 id="player-course-title" class="space-font font-black dark:text-white uppercase tracking-tighter text-xl leading-none mb-1 italic">Загрузка...</h2>
            <p id="player-lesson-title" class="text-[8px] font-black uppercase text-aura-primary tracking-[0.4em] opacity-80">Online Interactive Mode</p>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:bg-slate-200 dark:hover:bg-white/10 transition-all border border-slate-200 dark:border-white/10">
                <i id="theme-icon-app" class="fa-solid fa-moon text-lg"></i>
            </button>
            <div id="auth-btn-container"></div>
        </div>
    </header>

    <!-- =========================================================
         MAIN PLAYER INTERFACE
         ========================================================= -->
    <div class="player-layout">
        
        <!-- Sidebar: Программа модуля -->
        <aside class="bg-white dark:bg-slate-900/50 border-r border-slate-200 dark:border-white/5 overflow-y-auto p-6 custom-scrollbar">
            <div class="flex justify-between items-center mb-8 px-2">
                <h3 class="text-[9px] font-black uppercase text-slate-400 tracking-[0.2em] italic underline decoration-aura-primary decoration-2 underline-offset-4">Содержание курса</h3>
                <i class="fa-solid fa-list-check text-slate-300"></i>
            </div>
            
            <div id="lessons-list" class="space-y-3">
                <!-- Уроки генерируются через app.js -->
                <div class="animate-pulse space-y-3">
                    <div class="h-12 bg-slate-100 dark:bg-slate-800 rounded-xl"></div>
                    <div class="h-12 bg-slate-100 dark:bg-slate-800 rounded-xl"></div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace: Отрисовка блоков контента -->
        <main id="content-container" class="relative bg-white dark:bg-aura-dark overflow-y-auto p-12 lg:p-24 custom-scrollbar">
            <!-- Сюда AuraRenderer.generateHTML() вставит Lego-блоки -->
            <div id="empty-content" class="py-40 text-center opacity-20">
                <i class="fa-solid fa-cloud-download fa-fade text-6xl mb-6"></i>
                <h3 class="text-2xl font-black uppercase tracking-widest">Получение данных из Firestore...</h3>
            </div>
        </main>

    </div>

    <!-- =========================================================
         ACTION FOOTER (XP & COMPLETE)
         ========================================================= -->
    <footer class="h-24 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-white/5 px-10 flex justify-between items-center z-50 shadow-2xl">
        <div class="flex items-center gap-6">
            <div id="lesson-status-tag" class="hidden px-6 py-2 rounded-full bg-emerald-500/10 text-emerald-500 text-[10px] font-black uppercase border border-emerald-500/20">
                <i class="fa-solid fa-check-double mr-2"></i> Модуль пройден
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-black uppercase opacity-40">Active Session</span>
            </div>
        </div>

        <button id="complete-btn" onclick="triggerComplete()" class="bg-aura-primary text-white px-16 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest italic shadow-2xl hover:bg-indigo-700 transition-all flex items-center gap-4">
            <span>Завершить урок</span>
            <i class="fa-solid fa-circle-check text-lg"></i>
        </button>
    </footer>

    <!-- =========================================================
         MODALS & FLOATING WIDGETS
         ========================================================= -->

    <!-- Quiz Modal -->
    <div id="quiz-modal" class="hidden fixed inset-0 z-[300] bg-slate-950/95 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 p-12 rounded-[4.5rem] max-w-2xl w-full shadow-2xl border dark:border-white/5 animate-slideUp">
            <div class="text-center mb-10">
                <h3 class="text-4xl font-black tracking-tighter italic uppercase">Контроль знаний</h3>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-4">Наберите 100% для начисления XP в профиль</p>
            </div>
            <div id="quiz-questions-container" class="max-h-[45vh] overflow-y-auto pr-4 custom-scrollbar"></div>
            <div class="grid grid-cols-2 gap-6 mt-12">
                <button onclick="closeQuiz()" class="py-5 rounded-3xl font-black text-[10px] uppercase tracking-widest text-slate-400 hover:bg-white/5 transition-all">Отмена</button>
                <button onclick="validateQuiz()" class="bg-aura-primary py-5 rounded-3xl text-white font-black text-[10px] uppercase shadow-2xl hover:bg-indigo-700 transition-all">Проверить</button>
            </div>
        </div>
    </div>

    <!-- AI Chat Assistant -->
    <div class="fixed bottom-32 right-10 z-[150]">
        <button onclick="toggleChat()" class="w-16 h-16 bg-aura-primary text-white rounded-3xl shadow-2xl flex items-center justify-center hover:scale-110 transition-all group">
            <i class="fa-solid fa-robot text-2xl"></i>
        </button>
        <div id="ai-chat" class="hidden absolute bottom-20 right-0 w-96 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl border dark:border-white/5 overflow-hidden animate-slideUp">
            <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                <span class="font-black text-[10px] uppercase tracking-widest italic">Aura Online Assistant</span>
                <i class="fa-solid fa-chevron-down opacity-50 cursor-pointer" onclick="toggleChat()"></i>
            </div>
            <div id="chat-messages" class="h-80 overflow-y-auto p-6 space-y-4 font-medium text-sm custom-scrollbar bg-slate-50 dark:bg-aura-dark">
                <div class="bg-indigo-600 text-white p-4 rounded-2xl rounded-tl-none shadow-md">
                    Привет! Я анализирую облачный манифест этого курса. Задай любой вопрос по теме урока!
                </div>
            </div>
            <div class="p-5 border-t dark:border-white/5 glass-ui">
                <div class="relative">
                    <input type="text" id="chat-input" placeholder="Ваш вопрос..." class="w-full p-4 pr-12 rounded-2xl bg-white dark:bg-slate-800 border-none outline-none shadow-inner dark:text-white">
                    <button onclick="sendChatMessage()" class="absolute right-4 top-1/2 -translate-y-1/2 text-aura-primary hover:text-indigo-400">
                        <i class="fa-solid fa-paper-plane text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ПОДКЛЮЧЕНИЕ МАСТЕР-ЯДРА (v28.0) -->
    <script src="app.js"></script>

    <script>
        /**
         * ЛОГИКА ЗАПУСКА ПЛЕЕРА
         * Извлекает ID курса из URL и загружает его из Firestore
         */
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');

            if (!courseId) {
                alert("Курс не выбран!");
                location.href = 'market.html';
                return;
            }

            // Ждем инициализации Firebase в app.js
            setTimeout(async () => {
                try {
                    const doc = await window.auraCloudDB.collection('courses').doc(courseId).get();
                    if (doc.exists) {
                        const courseData = doc.data();
                        // Запускаем ядро плеера из app.js
                        window.openCourse(encodeURIComponent(JSON.stringify(courseData)));
                    } else {
                        alert("Курс не найден в облаке!");
                        location.href = 'market.html';
                    }
                } catch (e) {
                    console.error("Firestore Load Error:", e);
                }
            }, 500);
        });

        function triggerComplete() {
            // Если в app.js есть квиз - он сам вызовет showQuiz()
            const btn = document.getElementById('complete-btn');
            if (btn.innerText.includes('ТЕСТ')) {
                window.validateQuiz(); // Это вызовет проверку
            } else {
                // В онлайне просто закрываем или даем XP
                alert("Урок завершен! XP начислено.");
                window.closeCourse();
            }
        }

        function closeQuiz() {
            document.getElementById('quiz-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
